<div class="login-form-wrapper">
  <app-auth-pop>
    <div class="glass-sheet">
      <h1 class="form-title">Inscription</h1>
      <p class="form-subtitle">Rejoignez LUMYA et prenez soin de votre bien-être</p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field class="custom-form-field">
            <mat-label>Nom</mat-label>
            <input matInput type="text" required [(ngModel)]="nom" name="nom">
          </mat-form-field>

          <mat-form-field class="custom-form-field">
            <mat-label>Prénom</mat-label>
            <input matInput type="text" required [(ngModel)]="prenom" name="prenom">
          </mat-form-field>
        </div>

        <mat-form-field class="custom-form-field full-width">
          <mat-label>Adresse mail</mat-label>
          <input matInput type="email" required [(ngModel)]="email" name="email">
        </mat-form-field>

        <mat-form-field class="custom-form-field full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput [type]="showPwd ? 'text' : 'password'" required [(ngModel)]="password" name="password">
          <mat-icon matSuffix (click)="showPwd = !showPwd"></mat-icon>
        </mat-form-field>

        <mat-form-field class="custom-form-field full-width">
          <mat-label>Date de naissance</mat-label>
          <input matInput type="date" required [(ngModel)]="date" name="date">
        </mat-form-field>

        <button mat-raised-button class="custom-button" type="submit" [disabled]="loading()">
          {{ loading() ? 'Création en cours...' : 'Créer le compte' }}
        </button>

        <div *ngIf="message()" [ngClass]="messageType()">{{ message() }}</div>
      </form>
             <div class="signup-footer">
        <span>Pas de compte ?</span>
        <button mat-button color="primary"><a routerLink="/login">Connexion</a></button>
      </div>
