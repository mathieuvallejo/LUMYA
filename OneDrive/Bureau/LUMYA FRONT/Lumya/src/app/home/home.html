

<div class="home-container">
  <h1>Bienvenue sur LUMYA {{ user?.lastName }}</h1>
  <p>Votre espace pour cultiver votre bien-être mental.</p>

<div class="video">
  <div *ngFor="let video of videos">

    <video *ngIf="video.urlVideo" [src]="video.urlVideo" controls></video>
  </div>
</div>
