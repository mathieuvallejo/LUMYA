


<div class="profil">
  <div class="profile-container">
    <div class="page-content">
    <h2>Espace personnel</h2>

    <div class="profile-card">
      <div class="profile-photo-wrapper">
        <img src="https://i.pinimg.com/736x/02/3c/78/023c7839633d38b5951066e268dd4475.jpg" alt="Photo de profil" class="profile-photo">
      </div>

      <div class="profile-info-section">
        <h3 class="profile-name"> Mathieu </h3>
        <p class="profile-description"> Salut ! Je suis étudiant</p>
      </div>

      <div class="profile-stats-section">
        <div class="stat-item">
          <div class="stat-number"> 5</div>
          <div class="stat-label">Vidéos</div>
        </div>
        <div class="stat-item">
          <div class="stat-number"> 1000 </div>
          <div class="stat-label">Suivi(e)s</div>
        </div>
      </div>
    </div>

    <app-mood-picker></app-mood-picker>


    <!-- Form SIRET OPEN DATA -->

    <form (ngSubmit)="onSubmit()">
      <h3> Inscrivez-vous en tant que professionel Lumya</h3>
      <div class="form-row">
        <mat-form-field class="custom-form-field">
          <mat-label>Nom</mat-label>
          <input matInput type="text" required [(ngModel)]="nom" name="nom">
        </mat-form-field>

        <mat-form-field class="custom-form-field">
          <mat-label>Siret</mat-label>
          <input matInput type="text" required [(ngModel)]="siret" name="siret">
        </mat-form-field>
      </div>
      <button mat-raised-button class="custom-button" type="submit" [disabled]="verify()">
        {{ verify() ? 'Création en cours...' : 'Créer le compte' }}
      </button>
      @if (message()) {
        <div [ngClass]="messageType()">{{ message() }}</div>
      }
    </form>
    </div>
  </div>


</div>
